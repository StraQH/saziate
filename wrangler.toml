name = "saziate"
main = ".open-next/worker.js"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# Assets directory produced by @opennextjs/cloudflare build
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[[d1_databases]]
binding = "DB"
database_name = "saziate-db"
database_id = "92932312-77ce-422a-8cd7-be1e32472897"   

[vars]
NEXT_PUBLIC_APP_NAME = "Saziate"
NEXT_PUBLIC_MOCK_MODE = "false"

[build]
command = "npm run build:worker"

# ============================================
# DEMO ENVIRONMENT (demo.saziate.com)
# ============================================
# Deploy with: npx wrangler deploy -e demo
[env.demo]
name = "saziate-demo"

[env.demo.vars]
NEXT_PUBLIC_APP_NAME = "Saziate Demo"
NEXT_PUBLIC_MOCK_MODE = "true"

# CRITICAL: Isolate the Demo Database!
# Create a new DB: npx wrangler d1 create saziate-demo-db
# Then replace the database_id below. This ensures BetterAuth and any fallback queries 
# NEVER touch the production database, even if mock mode is bypassed.
[[env.demo.d1_databases]]
binding = "DB"
database_name = "saziate-demo-db"
database_id = "REPLACE_WITH_NEW_DEMO_DB_ID"
